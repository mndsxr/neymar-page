kind = "web"
previewPath = "/"
title = "Neymar Jr. | O Menino da Vila"
version = "1.0.0"
id = "artifacts/neymar-jr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21490

[services.development]
run = "pnpm --filter @workspace/neymar-jr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neymar-jr", "run", "build" ]
publicDir = "artifacts/neymar-jr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21490"
BASE_PATH = "/"
